<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" role="img" aria-label="skillpod banner">
  <title>skillpod — pod-style dependency manager for AI coding agent skills</title>

  <rect width="1600" height="480" fill="#FAFAF7"/>

  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#111418" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1600" height="480" fill="url(#dots)"/>

  <!-- mark { . } -->
  <g transform="translate(380 130)">
    <g fill="none" stroke="#111418" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
      <path d="M55 25 C 30 25 30 70 30 85 C 30 100 14 92 6 92 C 14 92 30 84 30 99 C 30 114 30 159 55 159"/>
      <path d="M125 25 C 150 25 150 70 150 85 C 150 100 166 92 174 92 C 166 92 150 84 150 99 C 150 114 150 159 125 159"/>
    </g>
    <circle cx="90" cy="92" r="14" fill="#D97706"/>
  </g>

  <!-- wordmark skill.pod -->
  <text x="590" y="252"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="128" font-weight="600" letter-spacing="-3" fill="#111418">skill</text>
  <circle cx="946" cy="216" r="17" fill="#D97706"/>
  <text x="982" y="252"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="128" font-weight="600" letter-spacing="-3" fill="#111418">pod</text>

  <!-- tagline -->
  <text x="590" y="320"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="22" font-weight="400" fill="#6B6F76">
    Pod-style dependency manager for AI coding agent skills.
  </text>
  <text x="590" y="356"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="22" font-weight="400" fill="#6B6F76">
    One declarative manifest, multi-agent fan-out.
  </text>
</svg>
