name: Feature request
description: Suggest a new feature or an improvement to an existing one.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Please describe what you'd like to see and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've evaluated.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, etc.
